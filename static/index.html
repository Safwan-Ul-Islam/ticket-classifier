<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ticket Classifier</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f0f2f5;
      color: #1a1a2e;
    }

    header {
      background: #1a1a2e;
      color: white;
      padding: 18px 32px;
      font-size: 1.2rem;
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }

    /* Submit form */
    .card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 28px;
    }

    .card h2 { margin-bottom: 16px; font-size: 1rem; color: #555; text-transform: uppercase; letter-spacing: 0.5px; }

    .form-row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }

    .form-row input {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
    }

    textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 0.95rem;
      resize: vertical;
      min-height: 100px;
      margin-bottom: 12px;
    }

    button.submit-btn {
      background: #4f46e5;
      color: white;
      border: none;
      padding: 11px 28px;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      font-weight: 600;
    }

    button.submit-btn:hover { background: #4338ca; }
    button.submit-btn:disabled { background: #a5b4fc; cursor: not-allowed; }

    /* Result box */
    #result {
      display: none;
      margin-top: 16px;
      padding: 16px;
      border-radius: 8px;
      background: #f8faff;
      border: 1px solid #e0e7ff;
    }

    #result .result-header {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
    }

    .badge-category { background: #e0e7ff; color: #4338ca; }
    .badge-high { background: #fee2e2; color: #dc2626; }
    .badge-normal { background: #dcfce7; color: #16a34a; }
    .badge-auto { background: #dcfce7; color: #16a34a; }
    .badge-human { background: #fef9c3; color: #ca8a04; }

    #result .reply-box {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 12px;
      font-size: 0.9rem;
      line-height: 1.6;
      color: #374151;
    }

    #result .label { font-size: 0.8rem; color: #888; margin-bottom: 4px; margin-top: 10px; }

    /* Tickets table */
    .tabs { display: flex; gap: 8px; margin-bottom: 16px; }

    .tab {
      padding: 8px 20px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: white;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
    }

    .tab.active { background: #4f46e5; color: white; border-color: #4f46e5; }

    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }

    th {
      text-align: left;
      padding: 10px 12px;
      background: #f8f9fa;
      color: #555;
      font-weight: 600;
      border-bottom: 2px solid #e5e7eb;
      font-size: 0.8rem;
      text-transform: uppercase;
    }

    td { padding: 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; }

    tr:hover td { background: #fafafa; }

    .ticket-body-cell { max-width: 220px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #555; }

    button.resolve-btn {
      background: #10b981;
      color: white;
      border: none;
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      cursor: pointer;
    }

    button.resolve-btn:hover { background: #059669; }

    .empty { text-align: center; padding: 40px; color: #aaa; }

    .confidence { font-weight: 600; color: #4f46e5; }
  </style>
</head>
<body>

<header>Support Ticket Classifier</header>

<div class="container">

  <!-- Submit Form -->
  <div class="card">
    <h2>Submit New Ticket</h2>
    <div class="form-row">
      <input id="customer_name" placeholder="Customer Name" value="Sarah" />
      <input id="customer_email" placeholder="Customer Email (optional)" />
      <input id="product_name" placeholder="Product Name" value="Acme Store" />
    </div>
    <textarea id="ticket_body" placeholder="Paste the customer's message here...">Hi, I forgot my password and the reset email is not arriving. Can you help?</textarea>
    <button class="submit-btn" id="submitBtn" onclick="submitTicket()">Classify Ticket</button>

    <div id="result">
      <div class="result-header">
        <span class="badge badge-category" id="r-category"></span>
        <span class="badge" id="r-urgency"></span>
        <span class="badge" id="r-auto"></span>
        <span class="confidence" id="r-confidence"></span>
      </div>
      <div class="label" id="r-label"></div>
      <div class="reply-box" id="r-reply"></div>
    </div>
  </div>

  <!-- Tickets Dashboard -->
  <div class="card">
    <h2>Tickets Dashboard</h2>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('all', this)">All Tickets</button>
      <button class="tab" onclick="switchTab('inbox', this)">Human Inbox</button>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Customer</th>
          <th>Message</th>
          <th>Category</th>
          <th>Confidence</th>
          <th>Urgency</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="ticketsBody">
        <tr><td colspan="8" class="empty">Loading...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
  const API = "http://127.0.0.1:8000";
  let currentTab = "all";

  async function submitTicket() {
    const btn = document.getElementById("submitBtn");
    btn.disabled = true;
    btn.textContent = "Classifying...";

    const body = {
      ticket_body: document.getElementById("ticket_body").value,
      customer_name: document.getElementById("customer_name").value,
      customer_email: document.getElementById("customer_email").value,
      product_name: document.getElementById("product_name").value,
    };

    try {
      const res = await fetch(`${API}/classify`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body),
      });
      const data = await res.json();
      if (!res.ok) { alert(data.detail); return; }

      const result = document.getElementById("result");
      result.style.display = "block";

      document.getElementById("r-category").textContent = data.category.replace("_", " ");
      document.getElementById("r-confidence").textContent = `Confidence: ${data.confidence}%`;

      const urgEl = document.getElementById("r-urgency");
      urgEl.textContent = data.urgency === "high" ? "High Urgency" : "Normal";
      urgEl.className = `badge ${data.urgency === "high" ? "badge-high" : "badge-normal"}`;

      const autoEl = document.getElementById("r-auto");
      autoEl.textContent = data.should_auto_reply ? "Auto Replied" : "Needs Human";
      autoEl.className = `badge ${data.should_auto_reply ? "badge-auto" : "badge-human"}`;

      document.getElementById("r-label").textContent = data.should_auto_reply ? "Auto Reply Sent:" : "Agent Summary:";
      document.getElementById("r-reply").textContent = data.auto_reply || data.agent_summary;

      loadTickets(currentTab);
    } catch (e) {
      alert("Error: " + e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = "Classify Ticket";
    }
  }

  async function loadTickets(tab) {
    const url = tab === "inbox" ? `${API}/tickets/inbox` : `${API}/tickets`;
    const res = await fetch(url);
    const tickets = await res.json();
    const tbody = document.getElementById("ticketsBody");

    if (tickets.length === 0) {
      tbody.innerHTML = `<tr><td colspan="8" class="empty">No tickets yet.</td></tr>`;
      return;
    }

    tbody.innerHTML = tickets.map(t => `
      <tr>
        <td>${t.id}</td>
        <td>${t.customer_name}</td>
        <td class="ticket-body-cell" title="${t.ticket_body}">${t.ticket_body}</td>
        <td><span class="badge badge-category">${t.category.replace("_", " ")}</span></td>
        <td class="confidence">${t.confidence}%</td>
        <td><span class="badge ${t.urgency === 'high' ? 'badge-high' : 'badge-normal'}">${t.urgency}</span></td>
        <td>${t.resolved ? "Resolved" : t.should_auto_reply ? "Auto Replied" : "Needs Human"}</td>
        <td>${!t.resolved && !t.should_auto_reply
          ? `<button class="resolve-btn" onclick="resolve(${t.id})">Resolve</button>`
          : "—"
        }</td>
      </tr>
    `).join("");
  }

  async function resolve(id) {
    await fetch(`${API}/tickets/${id}/resolve`, { method: "PATCH" });
    loadTickets(currentTab);
  }

  function switchTab(tab, el) {
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    el.classList.add("active");
    loadTickets(tab);
  }

  loadTickets("all");
</script>
</body>
</html>
